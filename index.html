<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Día Mamá 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
  --color: #e75480;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('fondo.png') no-repeat center/cover;
  min-height: 100vh;
}

/* overlay elegante */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(4px);
  z-index: -1;
}

/* CONTENEDOR */
.app {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

/* TITULO */
h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 3.5em;
  color: var(--color);
  margin-bottom: 40px;
}

/* 🔥 CONTENIDO */
.container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 80px;
}

/* TARJETA */
.card {
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 25px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

.card img {
  width: 320px;
  height: 320px;
  object-fit: cover;
  border-radius: 20px;
}

.nombre {
  font-family: 'Great Vibes', cursive;
  font-size: 2.5em;
  margin-top: 15px;
  color: var(--color);
}

/* MENU */
.menu {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.menu button {
  width: 300px;
  padding: 18px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(135deg, #e75480, #ff8fab);
  color: white;
  font-size: 1.2em;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.menu button:hover {
  transform: scale(1.05);
}

/* 💖 CORAZONES */
.heart {
  position: fixed;
  bottom: -20px;
  animation: subir 6s linear infinite;
  opacity: 0.6;
  pointer-events: none;
}

@keyframes subir {
  from {transform: translateY(0);}
  to {transform: translateY(-110vh);}
}

/* 📱 RESPONSIVE */
@media (max-width: 768px) {

  .container {
    flex-direction: column;
    gap: 30px;
  }

  h1 {
    font-size: 2.5em;
  }

  .card img {
    width: 100%;
    height: 240px;
  }

  .menu button {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="app">

<h1>¡Feliz día Mamá! 💖</h1>

<div class="container">

  <!-- FOTO -->
  <div class="card">
    <img src="mama.jpg">
    <div class="nombre">Cristobalina Contreras</div>
  </div>

  <!-- BOTONES -->
  <div class="menu">
    <button onclick="location.href='descripcion.html'">💖 Descripción de Mamá</button>
    <button onclick="location.href='momentos.html'">📸 Mejores Momentos</button>
    <button onclick="location.href='carta.html'">💌 Carta</button>
    <button onclick="location.href='sorpresa.html'">🎁 Sorpresa</button>
  </div>

</div>

</div>

<script>
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 500);
</script>

</body>
</html>
