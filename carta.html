<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta para Mamá 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
  --color: #e75480;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('fondo.png') no-repeat center/cover;
  min-height: 100vh;
}

/* overlay elegante */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(4px);
  z-index: -1;
}

/* CONTENEDOR */
.app {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
  text-align: center;
}

/* TITULO */
h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 3.5em;
  color: var(--color);
  margin-bottom: 30px;
}

/* CARTA */
.carta {
  background: rgba(255,255,255,0.9);
  padding: 40px;
  border-radius: 25px;
  text-align: left;
  font-size: 1.1em;
  line-height: 1.8;

  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

/* TEXTO ANIMADO */
#texto {
  min-height: 200px;
}

/* BOTONES */
.botones {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  gap: 15px;
}

.botones button {
  padding: 12px 20px;
  border: none;
  border-radius: 25px;
  background: var(--color);
  color: white;
  cursor: pointer;
  transition: 0.3s;
  font-size: 1em;
}

.botones button:hover {
  transform: scale(1.1);
}

/* 📱 MOBILE */
@media (max-width: 768px) {

  h1 {
    font-size: 2.5em;
  }

  .carta {
    padding: 25px;
    font-size: 1em;
  }

}
</style>
</head>

<body>

<div class="app">

<h1>Para ti, Mamá 💌</h1>

<div class="carta">
  <div id="texto"></div>
</div>

<div class="botones">
  <button onclick="reiniciar()">🔄 Leer de nuevo</button>

  <a href="index.html">
    <button>⬅ Volver</button>
  </a>
</div>

</div>

<script>
const mensaje = `Mamá,

Quiero que sepas lo importante que eres en mi vida.
Cada esfuerzo que hiciste por mí, cada consejo y cada abrazo,
han construido la persona que soy hoy.

Gracias por tu amor infinito,
por tu paciencia,
y por estar siempre incluso en los momentos más difíciles.

Eres mi ejemplo, mi refugio y mi mayor inspiración.

Te amo muchísimo 💖
`;

let i = 0;

function escribir() {
  if (i < mensaje.length) {
    document.getElementById("texto").innerHTML += mensaje.charAt(i);
    i++;
    setTimeout(escribir, 30);
  }
}

function reiniciar() {
  i = 0;
  document.getElementById("texto").innerHTML = "";
  escribir();
}

escribir();
</script>

</body>
