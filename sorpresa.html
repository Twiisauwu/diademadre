<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorpresa 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
  --color: #e75480;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: url('fondo.png') no-repeat center/cover;
  height: 100vh;
  overflow: hidden;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* CONTENEDOR */
.app {
  text-align: center;
}

/* TITULO */
.mensaje {
  font-family: 'Great Vibes', cursive;
  font-size: 3em;
  color: var(--color);
  margin-bottom: 20px;
}

/* 🎥 MARCO VIDEO */
.video-container {
  width: 600px;
  height: 340px;
  border-radius: 25px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  margin: auto;
}

/* VIDEO */
.video-container video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* BOTONES */
.botones {
  margin-top: 25px;
}

.botones button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: var(--color);
  color: white;
  cursor: pointer;
}

/* 💖 CORAZONES */
.heart {
  position: fixed;
  bottom: -20px;
  animation: subir 6s linear infinite;
  opacity: 0.7;
}

@keyframes subir {
  from { transform: translateY(0); }
  to { transform: translateY(-110vh); }
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .video-container {
    width: 90%;
    height: 220px;
  }

  .mensaje {
    font-size: 2em;
  }
}
</style>
</head>

<body>

<div class="app">

<div class="mensaje">
  Un mensaje especial para ti 💖
</div>

<!-- 🎥 VIDEO -->
<div class="video-container">
  <video controls autoplay>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<div class="botones">
  <a href="index.html">
    <button>⬅ Volver</button>
  </a>
</div>

</div>

<script>
/* 💖 CORAZONES */
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "💖";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (20 + Math.random() * 30) + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 400);
</script>

</body>
</html>
